<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale= 1.0">
        <link rel="stylesheet" href="../styles/styles.css">
        <link rel="stylesheet" href="../styles/header.css">
        <link rel="stylesheet" href="../styles/blog/blogBanner.css">
        <link rel="stylesheet" href="../styles/footer.css">
        <title>Jornada viagem: Blog</title>
    </head>
    <body>
        <header class="header">
            <picture class="header__logo">
                <source media="(min-width: 1440px)" srcset="../img/Header_rodapes/Logo-branco.png">
                <img src="../img/Header_rodapes/Símbolo_white.png" alt="Logo da jornada viagem">
            </picture>
            <a class="header__menu" href="#">
                <img class="menu__icosn" src="../img/Header_rodapes/menu.svg" alt="Icone de menu hamburguer">
            </a>
            <div class="header__desktopMenu">
                <a href="#" class="desktop__link">Blog</a>
                <a href="#" class="desktop__link">Pacotes de viagem</a>
                <a href="#" class="desktop__link">Contato</a>
            </div>
        </header>

        <main class="content">
            <section class="content__blogBanner">
                <h1 class="sectionTitle sectionTitle--blog">Blog da Jornada</h1>
                <p>Histórias de viagens de nossos clientes. Inspire-se, encontre roteiros e dicas! Qual seu próximo destino?</p>
            </section>

            <article class="destinationResumeCard">

            </article>
        </main>


        <footer class="footer">
            <picture>
                <source media="(min-width:768px)" srcset="../img/Desktop/Homepage/Imagem_pre_rodape.png">
                <source media="(min-width:768px)" srcset="../img/Tablet/Homepage/Imagem_pre_rodape.png">
                <img class="footer__banner" src="../img/Mobile/Homepage/Imagem_pre_rodape.png" alt="uma cidade costeira muito bonita">
            </picture>
            <div class="footer__informations">
                <div class="footer__informations__about">
                    <img class="footer__logo" src="../img/Header_rodapes/Logo-branco-com-tagline.png" alt="logo jornada viagens">
                    <p class="footer__text">Horário de atendimento: 08h - 20h (Segunda a Sábado)</p>
                    <p class="footer__text footer__text--biggerBottomMargin">Desenvolvido por Alura. Projeto fictício sem fins comerciais.</p>
                </div>
                <div class="footer__informations__social">
                    <p class="footer__text">Acesse nossas redes:</p>
                    <img class="footer__mediasIcon" src="../img/Header_rodapes/Whatsapp.svg" alt="logo do whatsApp">
                    <img class="footer__mediasIcon" src="../img/Header_rodapes/Instragam.svg" alt="logo do instagram">
                    <img class="footer__mediasIcon" src="../img/Header_rodapes/Twiter.svg" alt="logo do X(twitter)">
                </div>
            </div>
        </footer>
    </body>
</html>
